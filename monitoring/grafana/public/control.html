<!DOCTYPE html>
<html>
<head>
  <title>ORE Bot Control</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1e1e1e;
      color: #eee;
      padding: 20px;
      min-height: 100vh;
    }
    h1 { font-size: 18px; margin-bottom: 15px; color: #aaa; }
    .buttons { display: flex; gap: 10px; margin-bottom: 15px; }
    button {
      flex: 1;
      padding: 12px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.8; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .stop { background: #d32f2f; color: white; }
    .restart { background: #1976d2; color: white; }
    .status { background: #388e3c; color: white; }
    #result {
      background: #2d2d2d;
      padding: 10px;
      border-radius: 4px;
      font-size: 12px;
      white-space: pre-wrap;
      max-height: 150px;
      overflow-y: auto;
    }
    .success { color: #4caf50; }
    .error { color: #f44336; }
    .loading { color: #ff9800; }
  </style>
</head>
<body>
  <h1>ORE Bot Control</h1>
  <div class="buttons">
    <button class="stop" onclick="execute('stop')">STOP</button>
    <button class="restart" onclick="execute('restart')">RESTART</button>
    <button class="status" onclick="execute('status')">STATUS</button>
  </div>
  <div id="result">Click a button to execute action...</div>

  <script>
    const API_BASE = '/api';

    async function execute(action) {
      const result = document.getElementById('result');
      result.innerHTML = '<span class="loading">Executing ' + action + '...</span>';
      result.className = '';

      try {
        const method = action === 'status' ? 'GET' : 'POST';
        const response = await fetch(API_BASE + '/control/' + action, { method });
        const data = await response.text();

        if (response.ok) {
          result.innerHTML = '<span class="success">SUCCESS</span>\n' + data;
        } else {
          result.innerHTML = '<span class="error">ERROR</span>\n' + data;
        }
      } catch (err) {
        result.innerHTML = '<span class="error">ERROR</span>\n' + err.message;
      }
    }

    // Auto-refresh status on load
    execute('status');
  </script>
</body>
</html>
